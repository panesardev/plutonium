@if (view().article; as article) {
  <!-- metatags -->
  <meta name="title" [content]="article.title">
  <meta name="description" [content]="article.description">
  <meta name="author-name" [content]="article.authorName">
  <meta name="author-image" [content]="article.authorImage">
  <meta name="author-link" [content]="article.authorLink">
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" [content]="article.url">
  <meta property="og:title" [content]="article.title">
  <meta property="og:description" [content]="article.description">
  <meta property="og:image" [content]="article.coverUrl">
  <!-- Twitter -->  
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" [content]="article.title">
  <meta name="twitter:text:title" [content]="article.title">
  <meta name="twitter:description" [content]="article.description">
  <meta name="twitter:image" [content]="article.coverUrl">
  <meta name="twitter:url" [content]="article.url">
  
  <article itemscope itemtype="http://schema.org/Article">
    <section>
      <div class="px-4 md:px-8">
        <h1 class="page-heading">{{ article.title }}</h1>
        
        <div class="bg-neutral w-fit mx-auto mb-10 p-3 md:p-4 rounded-full custom-shadow">
          <app-hashtag-list [hashtags]="article.hashtags"/>
        </div>
        
        <p class="text-xl md:text-center mb-7">{{ article.description }}</p>
        
        <div class="flex flex-col md:flex-row md:items-center justify-center gap-4 md:gap-5 mb-7">
          <div class="flex items-center gap-3 md:gap-4">
            <img [ngSrc]="article.authorImage" class="rounded-full w-8" fallbackImage="assets/img/user.png" alt="user" height="30" width="30">
            <span>By <a target="_blank" rel="noopener" rel="noreferrer" [href]="article.authorLink">{{ article.authorName }}</a></span>
          </div>
          <div class="hidden md:block select-none">•</div>
          <div>Posted on {{ article.createdAt }}</div>
          <div class="hidden md:block select-none">•</div>
          <div class="inline-block">
            <a class="underline" [href]="article.source" target="_blank">source</a>
          </div>
        </div>
      </div>
      
      <div class="grid md:grid-cols-[300px_1fr] md:gap-10 max-w-7xl mx-auto md:px-8">
        <div>
          <div class="mb-8">
            @defer {
              <app-save-button [slug]="article.slug"/>
            }
            @placeholder { 
              <button class="btn btn-primary rounded md:w-full" routerLink="/login">
                Login to save
              </button>
            }
          </div>
          <div class="relative md:sticky md:top-28 h-min">
            <!-- table of contents -->
            @defer {
              <div class="bg-neutral custom-shadow md:rounded-md p-5 md:p-7 w-full select-none">
                <h1 class="text-primary text-2xl pb-2 mb-3 border-b-2 border-slate-100">Contents</h1>
                @for (toc of tableOfContents(); track toc.id) {
                  <div>
                    <span class="block rounded-md py-2 hover:pl-4 hover:bg-base-200 text-primary cursor-pointer transition-spacing duration-300"
                      (click)="scroll(toc.id)">
                      {{ toc.text }}
                    </span> 
                  </div>
                }
              </div>
            }
            @placeholder {
              <div class="flex justify-center">
                <div class="loading"></div>
              </div>
            }
          </div>
        </div>
        <div class="min-w-0">
          <img class="mb-10 md:rounded-md" ngSrc="/content/{{ article.slug }}/img/cover_800x450.webp" priority alt="article_cover" width="800" height="450">
          <div class="px-4 md:px-0" #markdown>
            <markdown class="markdown" [data]="article.markdown"/>
          </div>
        </div>
      </div>
    </section>  
  </article>
}
