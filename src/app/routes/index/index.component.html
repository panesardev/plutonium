@if (view(); as view) {
  <section>
    <div class="px-4 md:px-8 mb-12">
      <app-featured-article [article]="view.featured"/>
    </div>
  
    @defer {
      <app-home-user-card>
        <ng-container [ngTemplateOutlet]="userPlaceholder"/>
      </app-home-user-card>
    }
    @placeholder { 
      <ng-container [ngTemplateOutlet]="userPlaceholder"/>
    }
    <ng-template #userPlaceholder>
      <div class="bg-neutral max-w-md mx-auto p-6 md:p-8 mb-20 md:rounded-md custom-shadow">
        <h1 class="font-bold text-center text-2xl flex gap-2 mb-4">
          <span>Hello</span>
          <span class="text-primary">User</span>
        </h1>
        <p class="mb-4">You can save some articles!</p>
        <button class="btn bg-secondary text-primary" routerLink="/login">Login to continue</button>
      </div>
    </ng-template>

    <div class="px-4 md:px-8 mb-12">
      <h1 class="font-bold text-2xl md:text-3xl text-center text-primary mb-8">Recent articles</h1>
      <app-article-list [articles]="view.recent"/>
    </div>
  </section> 
}
