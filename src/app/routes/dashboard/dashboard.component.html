@if (view(); as view) {
  <section>
    <h1 class="heading">Dashboard</h1>
    <div class="grid md:grid-cols-[1fr_3fr] gap-8 md:px-8">
      @if (view.user; as user) {
        <div class="relative md:sticky md:top-32 h-min bg-neutral grid gap-4 md:gap-6 p-6 md:p-8 md:rounded-md select-none">
          <img [src]="user.photoURL" alt="user" fallbackImage="/assets/img/user.png" class="rounded-full w-20">
          <div>
            <h1 class="text-2xl text-primary font-bold mb-1">{{ user.displayName }}</h1>
            <p class="text-md">{{ user.email }}</p>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <button class="btn" [class]="user.isPro ? 'bg-primary text-base-100' : 'bg-secondary text-primary'" (click)="openProModal()">
              <span>{{ user.isPro ? 'PRO' : 'Basic' }}</span>
            </button>
            <button class="btn bg-red-500 text-base-100" (click)="openLogoutModal()">Logout</button>
          </div>
        </div>
      }
      @if (view.articles; as articles) {
        @if (articles.length) {
          <div class="grid gap-6 md:gap-8 px-4 md:px-0">
            <div>
              <h1 class="font-bold text-2xl text-center md:text-left text-primary select-none mb-2">Saved Articles</h1>
              <div class="w-full border-[1px] border-primary opacity-20 rounded-full"></div>
            </div>
            <app-article-list [articles]="articles"/>
          </div>
        } 
        @else {
          <div class="bg-neutral p-4 md:p-8 rounded-md">
            <p class="text-md mb-2">You have no saved articles yet!</p>
            <a routerLink="/articles" class="underline">See some articles</a>
          </div>
        }
      }
    </div>
  </section>
}
@else {
  <div class="flex justify-center">
    <div class="loading"></div>
  </div>
}
