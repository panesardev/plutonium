@if (view().hashtags; as hashtags) {
  <section class="px-4 md:px-8">
    <h1 class="page-heading">Hashtags</h1>
    <p class="md:text-xl text-center mb-10">
      Select any of these hashtags to view the articles related to that technology.
    </p>
  
    <div class="max-w-2xl mx-auto bg-neutral rounded-xl p-4 md:p-10">
      <app-hashtag-list [hashtags]="hashtags"/>
    </div>
  </section>
}
