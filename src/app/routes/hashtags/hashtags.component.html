@if (hashtags(); as hashtags) {
  <section class="px-4 md:px-8">
    <h1 class="heading mb-8 md:mb-12">Hashtags</h1>

    <p class="text-center md:text-xl mb-10">
      Select any of these hashtags to view the articles related to the hashtag.
    </p>
  
    <div class="max-w-2xl mx-auto bg-neutral rounded-md p-4 md:p-10">
      <app-hashtag-list [hashtags]="hashtags"/>
    </div>
  </section>
}
